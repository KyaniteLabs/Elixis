services:
  elixis:
    image: ${ELIXIS_IMAGE:-elixis:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: elixis
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://llama-local:8085/v1}
      - LLM_FALLBACK_URL=${LLM_FALLBACK_URL:-}
      - LLM_MODEL=${LLM_MODEL:-Qwen3.5-0.8B-Q4_K_M.gguf}
      - LLM_API_KEY=${LLM_API_KEY:-dummy}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      - ADMIN_API_KEY=${ADMIN_API_KEY:?set ADMIN_API_KEY before starting Elixis}
      - ELIXIS_DATA_DIR=/app/.elixis
      - ELIXIS_BACKUP_DIR=/app/.elixis/backups
      - CORS_ORIGIN=https://elixis.kyanitelabs.tech
      - HTTPS=1
      - PYTHONUNBUFFERED=1
    expose:
      - "3110"
    volumes:
      - elixis-data:/app/.elixis
    networks:
      - proxy-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.elixis.rule=Host(`elixis.kyanitelabs.tech`)"
      - "traefik.http.routers.elixis.entrypoints=websecure"
      - "traefik.http.routers.elixis.tls=true"
      - "traefik.http.routers.elixis.tls.certresolver=letsencrypt"
      - "traefik.http.services.elixis.loadbalancer.server.port=3110"
      - "traefik.docker.network=proxy-net"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  elixis-data:
    driver: local

networks:
  proxy-net:
    external: true
