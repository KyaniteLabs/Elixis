version: "3.8"

services:
  elixis:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: elixis
    restart: unless-stopped

    # Environment configuration
    environment:
      # LLM Provider Settings
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://172.17.0.1:8085/v1}
      - LLM_FALLBACK_URL=${LLM_FALLBACK_URL:-}
      - LLM_MODEL=${LLM_MODEL:-gemma-4b}
      - LLM_API_KEY=${LLM_API_KEY:-}

      # Application Settings
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    # Port mapping (internal only - Traefik handles external)
    expose:
      - "3110"

    # Persistent volume for data
    volumes:
      - elixis-data:/app/.elixis

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    # Network
    networks:
      - elixis-net

    # Labels for Traefik routing (Tailscale-only)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.elixis.rule=Host(`elixis.${TRAEFIK_DOMAIN:-tailnet}`)"
      - "traefik.http.routers.elixis.entrypoints=websecure"
      - "traefik.http.routers.elixis.tls=true"
      - "traefik.http.routers.elixis.tls.certresolver=tailscale"
      - "traefik.http.routers.elixis.middlewares=tailscale-only@file"
      - "traefik.http.services.elixis.loadbalancer.server.port=3110"

      # Health check
      - "traefik.http.services.elixis.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.elixis.loadbalancer.healthcheck.interval=10s"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Redis for caching (if needed later)
  # redis:
  #   image: redis:7-alpine
  #   container_name: elixis-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - elixis-net

volumes:
  elixis-data:
    driver: local
  # redis-data:
  #   driver: local

networks:
  elixis-net:
    driver: bridge
