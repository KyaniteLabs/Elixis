name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: Upload coverage (optional)
        if: github.event_name == 'push'
        run: |
          echo "Tests completed successfully"

  build:
    needs: test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
      GHCR_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy prerequisites
        run: |
          if [ -z "${VPS_HOST}" ] || [ -z "${VPS_USER}" ] || [ -z "${VPS_SSH_KEY}" ]; then
            echo "::error::Missing required secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY"
            exit 1
          fi

      - name: Deploy to VPS
        run: |
          IMAGE_REF="${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA::7}"
          IMAGE_REF="$(echo "${IMAGE_REF}" | tr '[:upper:]' '[:lower:]')"

          deploy_env="$(mktemp)"
          trap 'rm -f deploy_key "${deploy_env}"' EXIT
          echo "${VPS_SSH_KEY}" > deploy_key
          chmod 600 deploy_key

          # Add host key to known_hosts
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          {
            printf 'export ADMIN_API_KEY=%q\n' "${ADMIN_API_KEY}"
            printf 'export ELIXIS_IMAGE=%q\n' "${IMAGE_REF}"
          } > "${deploy_env}"

          # Copy compose file to VPS
          scp -i deploy_key -o StrictHostKeyChecking=no \
            docker-compose.yml ${VPS_USER}@${VPS_HOST}:/docker/elixis/
          scp -i deploy_key -o StrictHostKeyChecking=no \
            "${deploy_env}" ${VPS_USER}@${VPS_HOST}:/tmp/elixis-deploy-env

          printf '%s' "${GHCR_TOKEN}" | ssh -i deploy_key -o StrictHostKeyChecking=no \
            ${VPS_USER}@${VPS_HOST} \
            "docker login ${REGISTRY} -u '${GITHUB_ACTOR}' --password-stdin"

          # Deploy via SSH
          ssh -i deploy_key -o StrictHostKeyChecking=no \
            ${VPS_USER}@${VPS_HOST} 'bash -se' << 'EOF'
            set -euo pipefail
            trap 'rm -f /tmp/elixis-deploy-env' EXIT
            cd /docker/elixis
            source /tmp/elixis-deploy-env
            touch .env
            if grep -q '^ELIXIS_IMAGE=' .env; then
              tmp_env="$(mktemp)"
              sed "s|^ELIXIS_IMAGE=.*|ELIXIS_IMAGE=${ELIXIS_IMAGE}|" .env > "${tmp_env}"
              cat "${tmp_env}" > .env
              rm -f "${tmp_env}"
            else
              printf '\nELIXIS_IMAGE=%s\n' "${ELIXIS_IMAGE}" >> .env
            fi
            docker compose pull elixis
            docker compose up -d --no-build --remove-orphans
            actual_image="$(docker inspect elixis --format '{{.Config.Image}}')"
            if [ "${actual_image}" != "${ELIXIS_IMAGE}" ]; then
              echo "::error::elixis is running ${actual_image}, expected ${ELIXIS_IMAGE}"
              exit 1
            fi
            docker system prune -f
          EOF
