openapi: "3.1.0"
info:
  title: Elixis API
  description: |
    AI-powered identity synthesis companion for OpenClaw and Soul Spec.
    Transforms brain dump text into structured identity documents
    through a 4-phase pipeline: entity extraction, archetypal pattern analysis,
    domain connection, and lens-based synthesis (SOUL.md, Brand Voice, or Design System).
  version: "1.0.0"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    url: https://github.com/KyaniteLabs/Elixis

servers:
  - url: http://localhost:3110
    description: Local development server

paths:
  /api/game:
    post:
      summary: Run the full pipeline with lens selection
      description: |
        Runs the complete 4-phase Glass Bead Game pipeline (declare → elaborate →
        connect → resolve) on a brain dump and returns structured output through
        the chosen lens (identity, brand, or design).
      operationId: runGame
      tags: [Pipeline]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brain_dump]
              properties:
                brain_dump:
                  type: string
                  description: Raw text with references, influences, values
                lens:
                  type: string
                  enum: [identity, brand, design]
                  default: identity
                  description: Output lens for synthesis
      responses:
        "200":
          description: Pipeline result
          content:
            application/json:
              schema:
                type: object
                properties:
                  lens:
                    type: string
                  stage1_entities:
                    type: array
                    items:
                      $ref: "#/components/schemas/Entity"
                  stage2_graph:
                    $ref: "#/components/schemas/PatternGraph"
                  stage3_output:
                    type: string
                  stage3_soulmd:
                    type: string
                    nullable: true
                  threads:
                    type: array
                    items:
                      $ref: "#/components/schemas/Thread"
                  tensions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tension"
                  timings:
                    type: object
                    additionalProperties:
                      type: integer
                  quality:
                    $ref: "#/components/schemas/QualityReport"
        "400":
          description: Invalid input
        "503":
          description: LLM unavailable or server busy

  /api/game/stream:
    post:
      summary: Stream the full pipeline with SSE events
      description: |
        Runs the same pipeline as /api/game but streams results as Server-Sent Events.
        Events are emitted as each phase completes: entities, graph, tensions, and
        resolution chunks.
      operationId: streamGame
      tags: [Pipeline]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brain_dump]
              properties:
                brain_dump:
                  type: string
                lens:
                  type: string
                  enum: [identity, brand, design]
                  default: identity
      responses:
        "200":
          description: SSE stream of pipeline events
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid input
        "503":
          description: LLM unavailable or server busy

  /api/game/schema:
    get:
      summary: Get pipeline schema (phases, lenses, entity types)
      description: Returns the available pipeline phases, output lenses, and recognized entity types.
      operationId: getGameSchema
      tags: [Pipeline]
      responses:
        "200":
          description: Schema information
          content:
            application/json:
              schema:
                type: object
                properties:
                  phases:
                    type: array
                    items:
                      type: string
                  lenses:
                    type: array
                    items:
                      type: string
                  entity_types:
                    type: array
                    items:
                      type: string

  /api/lenses:
    get:
      summary: List available output lenses
      description: Returns the list of synthesis lenses (identity, brand, design).
      operationId: getLenses
      tags: [Pipeline]
      responses:
        "200":
          description: Lens list
          content:
            application/json:
              schema:
                type: object
                properties:
                  lenses:
                    type: array
                    items:
                      type: string

  /api/extract:
    post:
      summary: Run the legacy 3-stage pipeline on a brain dump
      description: |
        Extracts entities, analyzes archetypal patterns, and synthesizes a
        SOUL.md document. Supports both JSON and SSE streaming responses.
        Prefer /api/game for lens selection and structured output.
      operationId: extractSoul
      tags: [Pipeline]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brain_dump]
              properties:
                brain_dump:
                  type: string
                  description: Raw text with references, influences, values
                stream:
                  type: boolean
                  default: false
                  description: Enable SSE streaming response
      responses:
        "200":
          description: Pipeline result with entities, graph, and SOUL.md
          content:
            application/json:
              schema:
                type: object
                properties:
                  stage1_entities:
                    type: array
                    items:
                      $ref: "#/components/schemas/Entity"
                  stage2_graph:
                    $ref: "#/components/schemas/PatternGraph"
                  stage3_soulmd:
                    type: string
                  timings:
                    type: object
                    additionalProperties:
                      type: integer
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid input
        "503":
          description: LLM unavailable

  /api/translate:
    post:
      summary: Translate text to a target language
      operationId: translateText
      tags: [Translation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, target_lang]
              properties:
                text:
                  type: string
                target_lang:
                  type: string
                  description: "ISO language code (e.g. 'es', 'fr', 'de')"
                source_lang:
                  type: string
                  default: en
                soulmd:
                  type: boolean
                  default: false
                  description: Treat input as SOUL.md for structured translation
      responses:
        "200":
          description: Translation result

  /api/detect-language:
    post:
      summary: Detect the language of text
      operationId: detectLanguage
      tags: [Translation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        "200":
          description: Detected language

  /api/translate-stream:
    post:
      summary: Stream translation with SSE events
      operationId: translateStream
      tags: [Translation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, target_lang]
              properties:
                text:
                  type: string
                target_lang:
                  type: string
                source_lang:
                  type: string
                  default: en
      responses:
        "200":
          description: SSE stream of translation events

  /api/naming:
    post:
      summary: Research a name with semantic analysis
      description: |
        Analyzes a name's semantics, generates variants from taxonomy or general
        sources, and returns a research report with recommendations.
      operationId: researchName
      tags: [Naming]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                context:
                  type: string
                source:
                  type: string
                  enum: [general, taxonomy]
                  default: general
                  description: Variant generation source
                generate_variants:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Name research report

  /api/health:
    get:
      summary: Health check with LLM and disk status
      operationId: healthCheck
      tags: [System]
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  llm:
                    type: string
                    enum: [available, unavailable]
                  disk:
                    type: string
                    enum: [ok, low]

  /api/diagnostics:
    get:
      summary: Full diagnostics with recent runs and traces
      operationId: getDiagnostics
      tags: [System]
      responses:
        "200":
          description: Diagnostics data

  /api/runs:
    get:
      summary: Recent pipeline runs
      operationId: getRuns
      tags: [System]
      responses:
        "200":
          description: List of recent runs

  /api/languages:
    get:
      summary: Supported translation languages
      operationId: getLanguages
      tags: [Translation]
      responses:
        "200":
          description: Language code to name mapping

  /api/translation-cache:
    get:
      summary: Translation cache statistics
      operationId: getCacheStats
      tags: [System]
      delete:
        summary: Clear the translation cache
        operationId: clearCache
        responses:
          "200":
            description: Cache cleared

  /api/backups:
    get:
      summary: List available backups
      operationId: listBackups
      tags: [Backups]
      responses:
        "200":
          description: List of backups
    post:
      summary: Create a backup
      operationId: createBackup
      tags: [Backups]
      responses:
        "200":
          description: Backup created

  /api/backups/status:
    get:
      summary: Get backup status
      operationId: getBackupStatus
      tags: [Backups]
      responses:
        "200":
          description: Backup status

  /api/backups/restore:
    post:
      summary: Restore from a backup
      operationId: restoreBackup
      tags: [Backups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                force:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Restore result

  /api/backups/cleanup:
    post:
      summary: Remove old backups
      operationId: cleanupBackups
      tags: [Backups]
      responses:
        "200":
          description: Cleanup result

components:
  schemas:
    Entity:
      type: object
      properties:
        canonical:
          type: string
          description: Canonical entity name
        original:
          type: string
          description: Original text as it appeared
        type:
          type: string
          description: "Entity type (person, work, concept, historical_figure, etc.)"
        themes:
          type: array
          items:
            type: string
        traits:
          type: array
          items:
            type: string
        description:
          type: string
          description: Wikipedia summary if available

    PatternGraph:
      type: object
      properties:
        patterns:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              id:
                type: string
              probability:
                type: number
              supporting_entities:
                type: integer
        emergent_topic:
          type: string
        emergent_theme:
          type: string
        consensus_score:
          type: number
        bridges:
          type: array
          items:
            type: object

    Thread:
      type: object
      description: A narrative thread connecting entities through a pattern
      properties:
        pattern:
          type: string
        entities:
          type: array
          items:
            type: string
        narrative:
          type: string

    Tension:
      type: object
      description: A creative tension between opposing patterns
      properties:
        pattern_a:
          type: string
        pattern_b:
          type: string
        description:
          type: string

    QualityReport:
      type: object
      description: Output quality validation results
      properties:
        passed:
          type: boolean
        score:
          type: number
        checks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              passed:
                type: boolean
              message:
                type: string
