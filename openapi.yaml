openapi: "3.1.0"
info:
  title: Elixis API
  description: |
    Local-first AI pattern synthesis engine for Source Corpus ingestion,
    Market Kit orchestration, identity, brand voice, design systems, naming
    research, and lens-specific outputs. Elixis turns raw references,
    repositories, and folders into curated Corpus Signals, pattern graphs,
    naming directions, market positioning, messaging, and design-system guidance.
  version: "1.0.0"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    url: https://github.com/KyaniteLabs/Elixis

servers:
  - url: http://localhost:3110
    description: Local development server

tags:
  - name: Pipeline
    description: Identity-compatible synthesis routes
  - name: Synthesis
    description: Pattern synthesis phases and lens-based output generation
  - name: Ingestion
    description: Source Corpus ingestion and Market Kit orchestration
  - name: Translation
    description: Translation, language detection, and cache routes
  - name: Naming
    description: Name research and name generation
  - name: System
    description: Health, diagnostics, and run history
  - name: Backups
    description: Backup and restore operations

paths:
  /api/extract:
    post:
      summary: Run the identity-compatible pipeline on a brain dump
      description: |
        Compatibility route that runs the pattern synthesis pipeline through the identity lens
        and returns a SOUL.md-compatible result. Supports JSON and SSE.
      operationId: extractSoul
      tags: [Pipeline]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              oneOf:
                - required: [brain_dump]
                - required: [text]
              properties:
                brain_dump:
                  type: string
                  description: Raw text with references, influences, and values
                text:
                  type: string
                  description: Alias for brain_dump
                stream:
                  type: boolean
                  default: false
                  description: Enable SSE streaming response
      responses:
        "200":
          description: Pipeline result with entities, graph, SOUL.md, and auditable process trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractResult"
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Server busy, shutting down, or LLM unavailable

  /api/extract/stream:
    post:
      summary: Stream the identity-compatible pipeline with SSE events
      description: "Slash-style alias for posting `{ stream: true }` to `/api/extract`."
      operationId: extractSoulStream
      tags: [Pipeline]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              oneOf:
                - required: [brain_dump]
                - required: [text]
              properties:
                brain_dump:
                  type: string
                text:
                  type: string
      responses:
        "200":
          description: SSE stream of identity pipeline events
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid input

  /api/game:
    post:
      summary: Run the pattern synthesis pipeline through a selected output lens
      operationId: runGame
      tags: [Synthesis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameRequest"
      responses:
        "200":
          description: Lens-specific synthesis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResult"
        "400":
          description: Invalid input or lens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Server busy or shutting down

  /api/game/stream:
    post:
      summary: Stream the pattern synthesis pipeline through a selected output lens
      description: |
        Streams declaration, connection, process_trace, tension, output-token,
        telemetry, and completion events. Non-identity lenses stream their final
        markdown as output tokens.
      operationId: streamGame
      tags: [Synthesis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameRequest"
      responses:
        "200":
          description: SSE stream of synthesis events
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid input or lens

  /api/lenses:
    get:
      summary: List available output lenses
      operationId: getLenses
      tags: [Synthesis]
      responses:
        "200":
          description: Available lenses
          content:
            application/json:
              schema:
                type: object
                properties:
                  lenses:
                    type: array
                    items:
                      $ref: "#/components/schemas/Lens"

  /api/game/schema:
    get:
      summary: Describe synthesis phases, lenses, and entity types
      operationId: getGameSchema
      tags: [Synthesis]
      responses:
        "200":
          description: Synthesis schema
          content:
            application/json:
              schema:
                type: object
                properties:
                  phases:
                    type: array
                    items:
                      type: string
                  lenses:
                    type: array
                    items:
                      $ref: "#/components/schemas/Lens"
                  entity_types:
                    type: array
                    items:
                      type: string

  /api/translate:
    post:
      summary: Translate text to a target language
      operationId: translateText
      tags: [Translation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, target_lang]
              properties:
                text:
                  type: string
                target_lang:
                  type: string
                  description: "ISO language code, such as es, fr, or de"
                source_lang:
                  type: string
                  default: en
                soulmd:
                  type: boolean
                  default: false
                  description: Treat input as SOUL.md for structured translation
      responses:
        "200":
          description: Translation result

  /api/detect-language:
    post:
      summary: Detect the language of text
      operationId: detectLanguage
      tags: [Translation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        "200":
          description: Detected language

  /api/translate-stream:
    post:
      summary: Stream translation with SSE events
      operationId: translateStream
      tags: [Translation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, target_lang]
              properties:
                text:
                  type: string
                target_lang:
                  type: string
                source_lang:
                  type: string
                  default: en
      responses:
        "200":
          description: SSE stream of translation events

  /api/translate/stream:
    post:
      summary: Stream translation with SSE events
      description: Slash-style alias for `/api/translate-stream`.
      operationId: translateStreamAlias
      tags: [Translation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, target_lang]
              properties:
                text:
                  type: string
                target_lang:
                  type: string
                source_lang:
                  type: string
                  default: en
      responses:
        "200":
          description: SSE stream of translation events

  /api/naming:
    post:
      summary: Research a name with semantic analysis
      operationId: researchName
      tags: [Naming]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                context:
                  type: string
                generate_variants:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Name research report

  /api/ingest:
    post:
      summary: Build a Source Corpus from a GitHub repository or local folder
      description: |
        Read-only ingestion route that discovers, filters, scores, and persists
        quality-improving Corpus Signals. Sensitive Candidates are rejected
        before scoring, and only rejection categories or paths are reported.
      operationId: ingestSource
      tags: [Ingestion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "200":
          description: Shared Ingestion Result contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionResult"
        "400":
          description: Invalid source target or ingestion option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Server busy or shutting down

  /api/market-kit:
    post:
      summary: Build a Source Corpus and generate a structured Market Kit
      description: |
        Orchestrates Source Corpus ingestion through the pattern workflow to
        produce naming, positioning, brand voice, messaging, and visual design
        direction. HTML and CSS artifacts are explicit artifact tiers for cases
        where human-readable visual review is worth the extra token cost.
      operationId: createMarketKit
      tags: [Ingestion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "200":
          description: Ingestion Result with market_kit and optional artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionResult"
        "400":
          description: Invalid source target or ingestion option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Server busy or shutting down

  /api/ingest/{run_id}:
    get:
      summary: Inspect a persisted Ingestion Result
      operationId: getIngestionRun
      tags: [Ingestion]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{12}$"
      responses:
        "200":
          description: Persisted Ingestion Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionResult"
        "404":
          description: Ingestion run was not found

  /api/health:
    get:
      summary: Health check with LLM and disk status
      operationId: healthCheck
      tags: [System]
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  llm:
                    type: string
                    enum: [available, unavailable]
                  disk:
                    type: string
                    enum: [ok, low]
                  errors:
                    type: object
                    additionalProperties:
                      type: string

  /api/diagnostics:
    get:
      summary: Full diagnostics with recent runs and traces
      operationId: getDiagnostics
      tags: [System]
      security:
        - AdminToken: []
      responses:
        "200":
          description: Diagnostics data
        "401":
          description: Admin authorization required
        "503":
          description: Admin API key is not configured

  /api/runs:
    get:
      summary: Recent pipeline runs
      operationId: getRuns
      tags: [System]
      security:
        - AdminToken: []
      responses:
        "200":
          description: List of recent runs
        "401":
          description: Admin authorization required
        "503":
          description: Admin API key is not configured

  /api/languages:
    get:
      summary: Supported translation languages
      operationId: getLanguages
      tags: [Translation]
      responses:
        "200":
          description: Language code to name mapping

  /api/translation-cache:
    get:
      summary: Translation cache statistics
      operationId: getCacheStats
      tags: [Translation]
      responses:
        "200":
          description: Cache statistics
    delete:
      summary: Clear the translation cache
      operationId: clearCache
      tags: [Translation]
      security:
        - AdminToken: []
      responses:
        "200":
          description: Cache cleared
        "401":
          description: Admin authorization required
        "503":
          description: Admin API key is not configured

  /api/backups:
    get:
      summary: List available backups
      operationId: listBackups
      tags: [Backups]
      security:
        - AdminToken: []
      responses:
        "200":
          description: List of backups
        "401":
          description: Admin authorization required
        "503":
          description: Admin API key is not configured
    post:
      summary: Create a backup
      operationId: createBackup
      tags: [Backups]
      security:
        - AdminToken: []
      responses:
        "200":
          description: Backup created
        "202":
          description: Backup skipped
        "401":
          description: Admin authorization required
        "503":
          description: Admin API key is not configured

  /api/backups/status:
    get:
      summary: Get backup status
      operationId: getBackupStatus
      tags: [Backups]
      security:
        - AdminToken: []
      responses:
        "200":
          description: Backup status
        "401":
          description: Admin authorization required
        "503":
          description: Admin API key is not configured

  /api/backups/restore:
    post:
      summary: Restore from a backup
      operationId: restoreBackup
      tags: [Backups]
      security:
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                force:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Restore result
        "400":
          description: Invalid restore request
        "401":
          description: Admin authorization required
        "503":
          description: Admin API key is not configured

  /api/backups/cleanup:
    post:
      summary: Remove old backups
      operationId: cleanupBackups
      tags: [Backups]
      security:
        - AdminToken: []
      responses:
        "200":
          description: Cleanup result
        "401":
          description: Admin authorization required
        "503":
          description: Admin API key is not configured

  /api/backups/{name}:
    delete:
      summary: Delete a backup by name
      operationId: deleteBackup
      tags: [Backups]
      security:
        - AdminToken: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
      responses:
        "200":
          description: Backup deletion result
        "400":
          description: Invalid backup name
        "401":
          description: Admin authorization required
        "503":
          description: Admin API key is not configured

components:
  securitySchemes:
    AdminToken:
      type: http
      scheme: bearer
      description: ADMIN_API_KEY bearer token. X-Admin-API-Key is also accepted by the server.
  schemas:
    IngestRequest:
      type: object
      oneOf:
        - required: [github]
        - required: [path]
      properties:
        github:
          type: string
          description: GitHub repository URL, such as https://github.com/KyaniteLabs/Elixis
        path:
          type: string
          description: Local folder path on the Elixis host
        kit:
          type: boolean
          default: false
          description: Include Market Kit orchestration when posted to /api/ingest
        artifacts:
          type: array
          description: Explicit artifact tiers to render
          items:
            type: string
            enum: [markdown, html, css, market-page]
        include_code:
          type: boolean
          default: false
          description: Include supporting code evidence
        include_issues:
          type: boolean
          default: false
          description: Include GitHub issue evidence
        include_prs:
          type: boolean
          default: false
          description: Include GitHub pull request evidence
        include_commits:
          type: boolean
          default: false
          description: Include GitHub commit trajectory evidence
        include_hidden:
          type: boolean
          default: false
          description: Include safe hidden local files
        include_large_files:
          type: boolean
          default: false
          description: Allow large text files into scoring
        include_visual_analysis:
          type: boolean
          default: false
          description: Include visual asset metadata for downstream visual review
        max_signals:
          type: integer
          minimum: 1
          maximum: 500
          default: 80

    IngestionResult:
      type: object
      properties:
        run_id:
          type: string
          pattern: "^[a-f0-9]{12}$"
        source_target:
          type: object
          properties:
            type:
              type: string
              enum: [github, local]
            name:
              type: string
            path:
              type: string
            url:
              type: string
            metadata:
              type: object
              additionalProperties: true
        source_corpus:
          type: object
          properties:
            signals:
              type: array
              items:
                $ref: "#/components/schemas/CorpusSignal"
            signal_count:
              type: integer
            corpus_text:
              type: string
        rejected_signals:
          type: object
          description: Aggregated rejection counts and paths. Secret values are never exposed.
          additionalProperties: true
        signal_value_summary:
          type: object
          additionalProperties: true
        artifact_tiers:
          type: array
          items:
            type: string
        pattern_graph:
          $ref: "#/components/schemas/PatternGraph"
        market_kit:
          $ref: "#/components/schemas/MarketKit"
        artifacts:
          type: object
          description: Optional rendered artifact files keyed by filename
          additionalProperties:
            type: string
        process_trace:
          type: object
          additionalProperties: true

    CorpusSignal:
      type: object
      properties:
        kind:
          type: string
          description: Evidence class, such as documentation, metadata, visual_asset, or code_evidence
        title:
          type: string
        text:
          type: string
        path:
          type:
            - string
            - "null"
        url:
          type:
            - string
            - "null"
        score:
          type: number
        score_reasons:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true

    MarketKit:
      type: object
      properties:
        title:
          type: string
        positioning:
          type: object
          additionalProperties: true
        naming:
          type: object
          additionalProperties: true
        brand_voice:
          type: object
          additionalProperties: true
        messaging:
          type: object
          additionalProperties: true
        design_system:
          type: object
          properties:
            markdown:
              type: string
            color_palette:
              type: object
              additionalProperties:
                type: string
            typography:
              type: object
              additionalProperties:
                type: string
            spacing:
              type: object
              additionalProperties:
                type: string
            borders:
              type: object
              additionalProperties:
                type: string
            shadows:
              type: object
              additionalProperties:
                type: string
            visual_motifs:
              type: array
              items:
                type: string
        evidence_map:
          type: object
          additionalProperties: true

    Lens:
      type: string
      enum: [brand, design, identity]

    Error:
      type: object
      properties:
        error:
          type: string
        _request_id:
          type: string

    GameRequest:
      type: object
      oneOf:
        - required: [brain_dump]
        - required: [text]
      properties:
        brain_dump:
          type: string
          description: Raw text with references, influences, and values
        text:
          type: string
          description: Alias for brain_dump
        lens:
          $ref: "#/components/schemas/Lens"
      examples:
        - brain_dump: Batman, Athena, blueprints, ritual, clarity
          lens: brand

    GameResult:
      type: object
      properties:
        lens:
          $ref: "#/components/schemas/Lens"
        stage1_entities:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
        stage2_graph:
          $ref: "#/components/schemas/PatternGraph"
        output:
          type: string
          description: Normalized lens-specific markdown output shared with API responses
        stage3_output:
          type: string
          description: Lens-specific markdown output
        stage3_soulmd:
          type:
            - string
            - "null"
          description: SOUL.md when lens is identity, otherwise null
        threads:
          type: array
          items:
            type: object
        tensions:
          type: array
          items:
            type: object
        timings:
          type: object
          additionalProperties:
            type: integer
        quality:
          type: object
        process_trace:
          $ref: "#/components/schemas/ProcessTrace"

    ProcessTrace:
      type: object
      description: Auditable pipeline trace. This exposes observable steps, evidence, scores, model metadata, and timings; it does not expose internal token-level reasoning.
      properties:
        visibility:
          type: string
        lens:
          $ref: "#/components/schemas/Lens"
        model:
          type: object
          properties:
            provider:
              type: string
            model:
              type: string
            base_host:
              type: string
            classify_model:
              type: string
        phases:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                enum: [declaration, elaboration, connection, resolution]
              method:
                type: string
              duration_ms:
                type:
                  - integer
                  - "null"
              source:
                type:
                  - string
                  - "null"
              model:
                type:
                  - string
                  - "null"
              provider:
                type:
                  - string
                  - "null"
              tokens_in:
                type:
                  - integer
                  - "null"
              tokens_out:
                type:
                  - integer
                  - "null"
        pattern_matching:
          type: object
          properties:
            method:
              type: string
              example: "0.7 LLM classification + 0.3 keyword/theme/type/knowledge scoring"
            llm_available:
              type:
                - boolean
                - "null"
            classification_source:
              type:
                - string
                - "null"
            classification_error:
              type:
                - string
                - "null"
            top_patterns:
              type: array
              items:
                type: object
            bridges:
              type: array
              items:
                type: object
            entity_scores:
              type: array
              items:
                type: object
            analysis_notes:
              type: array
              items:
                type: string
            emergent_topic:
              type:
                - string
                - "null"
            emergent_theme:
              type:
                - string
                - "null"
            consensus_score:
              type:
                - number
                - "null"
        entities:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              themes:
                type: array
                items:
                  type: string
              traits:
                type: array
                items:
                  type: string
              domains:
                type: array
                items:
                  type: string
              confidence:
                type:
                  - number
                  - "null"
        timings_ms:
          type: object
          additionalProperties:
            type: integer

    ExtractResult:
      type: object
      properties:
        stage1_entities:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
        stage2_graph:
          $ref: "#/components/schemas/PatternGraph"
        output:
          type: string
          description: Normalized markdown output shared with API responses.
        stage3_soulmd:
          type: string
        stage3_output:
          type: string
          description: Same markdown output as stage3_soulmd, provided for parity with /api/game.
        timings:
          type: object
          additionalProperties:
            type: integer
        process_trace:
          $ref: "#/components/schemas/ProcessTrace"

    Entity:
      type: object
      properties:
        canonical:
          type: string
          description: Canonical entity name
        original:
          type: string
          description: Original text as it appeared
        type:
          type: string
          description: "Entity type: person, work, concept, historical_figure, and others"
        themes:
          type: array
          items:
            type: string
        traits:
          type: array
          items:
            type: string
        domains:
          type: array
          items:
            type: string
        sentiment:
          type: string
        intensity:
          type: number
        confidence:
          type: number
        description:
          type: string
          description: Wikipedia or knowledge-base summary when available

    PatternGraph:
      type: object
      properties:
        patterns:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              id:
                type: string
              probability:
                type: number
              supporting_entities:
                type: integer
        emergent_topic:
          type: string
        emergent_theme:
          type: string
        consensus_score:
          type: number
        bridges:
          type: array
          items:
            type: object
        threads:
          type: array
          items:
            type: object
